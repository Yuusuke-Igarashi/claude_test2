# 静的サイト（自己完結の index.html）を GitHub Pages にそのまま配信する。
# Jekyll ビルドは通さず、リポジトリ内容をそのままアップロードする。
name: Deploy static site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行は1つ。実行中のデプロイはキャンセルしない。
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build static site
        run: |
          node scripts/build-static.mjs
          mkdir -p _site
          cp index.html _site/index.html
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 生成した index.html だけを配信（ソースや .git は公開しない）
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
