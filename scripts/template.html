<title>🍜 ラーメンレーダー — 直近1時間のSNSラーメン投稿マップ</title>
<style>
:root{
  --bg:#f7f3ec; --panel:#fffdf9; --panel2:#f0eadf; --line:#e2d9c9;
  --text:#2a2318; --muted:#7a7060; --accent:#e0562a; --accent-ink:#fff;
  --sea:#eef4f7; --sea2:#e6eff4; --land:#e6ddcd; --land-line:#cdbfa8;
  --high:#e23b3b; --medium:#e08a12; --low:#2f7fd6;
  --shadow:0 12px 30px rgba(60,40,20,.18);
}
@media (prefers-color-scheme:dark){
  :root{
    --bg:#14110d; --panel:#1e1a14; --panel2:#26211a; --line:#332c22;
    --text:#f0ece4; --muted:#a39a89; --accent:#ff7a45; --accent-ink:#1a1205;
    --sea:#0e0b07; --sea2:#141a22; --land:#2c2620; --land-line:#40382e;
    --high:#ff5a5a; --medium:#ffb03a; --low:#4aa3ff;
    --shadow:0 12px 30px rgba(0,0,0,.55);
  }
}
:root[data-theme="light"]{
  --bg:#f7f3ec; --panel:#fffdf9; --panel2:#f0eadf; --line:#e2d9c9;
  --text:#2a2318; --muted:#7a7060; --accent:#e0562a; --accent-ink:#fff;
  --sea:#eef4f7; --sea2:#e6eff4; --land:#e6ddcd; --land-line:#cdbfa8;
  --high:#e23b3b; --medium:#e08a12; --low:#2f7fd6; --shadow:0 12px 30px rgba(60,40,20,.18);
}
:root[data-theme="dark"]{
  --bg:#14110d; --panel:#1e1a14; --panel2:#26211a; --line:#332c22;
  --text:#f0ece4; --muted:#a39a89; --accent:#ff7a45; --accent-ink:#1a1205;
  --sea:#0e0b07; --sea2:#141a22; --land:#2c2620; --land-line:#40382e;
  --high:#ff5a5a; --medium:#ffb03a; --low:#4aa3ff; --shadow:0 12px 30px rgba(0,0,0,.55);
}
*{box-sizing:border-box;}
html,body{margin:0;height:100%;}
body{
  background:var(--bg); color:var(--text);
  font-family:system-ui,-apple-system,"Hiragino Kaku Gothic ProN","Noto Sans JP",Meiryo,sans-serif;
  display:flex; flex-direction:column; min-height:100vh; min-height:100dvh;
}
.topbar{
  display:flex; align-items:center; justify-content:space-between; gap:16px;
  padding:12px 20px; background:var(--panel); border-bottom:1px solid var(--line);
  flex-wrap:wrap;
}
.brand{display:flex; align-items:center; gap:12px;}
.logo{font-size:32px; line-height:1;}
.topbar h1{margin:0; font-size:19px; letter-spacing:.02em; font-weight:800;}
.eyebrow{margin:0 0 1px; font-size:10px; letter-spacing:.28em; color:var(--accent); font-weight:700;}
.tagline{margin:2px 0 0; font-size:12px; color:var(--muted);}
.tagline b{color:var(--accent);}
.controls{display:flex; align-items:center; gap:14px; flex-wrap:wrap;}
.stat{display:flex; flex-direction:column; align-items:center; line-height:1.05;}
.stat-num{font-size:22px; font-weight:800; color:var(--accent); font-variant-numeric:tabular-nums;}
.stat-label{font-size:9.5px; letter-spacing:.12em; color:var(--muted); text-transform:uppercase;}
.auto{font-size:12px; color:var(--muted); display:flex; align-items:center; gap:6px; cursor:pointer; user-select:none;}
.btn{
  background:var(--accent); color:var(--accent-ink); border:0; border-radius:9px;
  padding:8px 15px; font-weight:700; cursor:pointer; font-size:13px; font-family:inherit;
}
.btn:hover{filter:brightness(1.07);}
.btn:active{transform:translateY(1px);}
.iconbtn{
  background:var(--panel2); color:var(--text); border:1px solid var(--line);
  border-radius:9px; width:36px; height:36px; cursor:pointer; font-size:15px; line-height:1;
}
.iconbtn:hover{border-color:var(--accent);}
.badge{font-size:10.5px; font-weight:700; padding:4px 9px; border-radius:20px; letter-spacing:.02em;}
.badge-demo{background:color-mix(in srgb,var(--medium) 20%,transparent); color:var(--medium); border:1px solid color-mix(in srgb,var(--medium) 45%,transparent);}
.badge-live{background:color-mix(in srgb,#2fbf6b 20%,transparent); color:#2fbf6b; border:1px solid color-mix(in srgb,#2fbf6b 45%,transparent);}
.layout{flex:1; display:grid; grid-template-columns:1fr 340px; min-height:0;}
.mapwrap{position:relative; overflow:hidden;
  background:radial-gradient(1100px 680px at 62% 22%, var(--sea2), var(--sea));}
#map{width:100%; height:100%; display:block;}
.pref{fill:var(--land); stroke:var(--land-line); stroke-width:.5; stroke-linejoin:round;}
.pin{cursor:pointer;}
.pin.c-high{fill:var(--high);} .pin.c-medium{fill:var(--medium);} .pin.c-low{fill:var(--low);}
.pin{stroke:var(--panel); stroke-width:1.2;}
.pin:hover,.pin.active{stroke:#fff; stroke-width:2.2;}
.pin-halo{fill:none; opacity:.4;}
.pulse{animation:pulse 1.9s ease-out infinite; transform-origin:center; transform-box:fill-box;}
@keyframes pulse{0%{opacity:.55; r:4;}70%{opacity:0; r:17;}100%{opacity:0; r:17;}}
@media (prefers-reduced-motion:reduce){.pulse{animation:none; opacity:0;}}
.legend{
  position:absolute; left:14px; bottom:14px; background:color-mix(in srgb,var(--panel) 82%,transparent);
  border:1px solid var(--line); border-radius:11px; padding:9px 12px; font-size:11.5px; color:var(--muted);
  display:flex; flex-direction:column; gap:5px; backdrop-filter:blur(6px);
}
.legend .dot{display:inline-block; width:9px; height:9px; border-radius:50%; margin-right:7px; vertical-align:middle;}
.dot.c-high{background:var(--high);} .dot.c-medium{background:var(--medium);} .dot.c-low{background:var(--low);}
.tooltip{
  position:absolute; z-index:20; width:262px; pointer-events:none;
  background:var(--panel); border:1px solid var(--line); border-radius:13px;
  box-shadow:var(--shadow); overflow:hidden; transform:translate(-50%,calc(-100% - 16px));
}
.tooltip.below{transform:translate(-50%,0);}
.tooltip[hidden]{display:none;}
.tt-img{width:100%; height:132px; object-fit:cover; display:block; background:var(--panel2);}
.tt-body{padding:11px 13px;}
.tt-loc{font-size:13px; font-weight:800; color:var(--accent); display:flex; align-items:center; gap:6px; flex-wrap:wrap;}
.tt-conf{font-size:9.5px; font-weight:700; padding:1px 7px; border-radius:10px; letter-spacing:.02em;}
.conf-high{background:color-mix(in srgb,var(--high) 18%,transparent); color:var(--high);}
.conf-medium{background:color-mix(in srgb,var(--medium) 18%,transparent); color:var(--medium);}
.conf-low{background:color-mix(in srgb,var(--low) 18%,transparent); color:var(--low);}
.tt-text{font-size:12px; margin:7px 0; line-height:1.45; max-height:4.4em; overflow:hidden;}
.tt-meta{font-size:11px; color:var(--muted); display:flex; justify-content:space-between; gap:8px;}
.tt-tags{margin-top:7px; display:flex; flex-wrap:wrap; gap:4px;}
.tt-tag{font-size:10px; background:var(--panel2); color:var(--muted); border-radius:8px; padding:1px 7px;}
.sidebar{background:var(--panel); border-left:1px solid var(--line); display:flex; flex-direction:column; min-height:0;}
.sidebar-head{padding:12px 14px; border-bottom:1px solid var(--line); display:flex; align-items:baseline; justify-content:space-between;}
.sidebar-head h2{margin:0; font-size:13px; letter-spacing:.02em;}
.updated{font-size:11px; color:var(--muted); font-variant-numeric:tabular-nums;}
.post-list{list-style:none; margin:0; padding:6px; overflow-y:auto; flex:1;}
.post-item{display:flex; gap:10px; padding:8px; border-radius:11px; cursor:pointer;}
.post-item:hover,.post-item.active{background:var(--panel2);}
.post-item img{width:54px; height:54px; border-radius:9px; object-fit:cover; flex:none; background:var(--panel2);}
.pi-body{min-width:0;}
.pi-loc{font-size:12.5px; font-weight:800; color:var(--accent); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.pi-text{font-size:11.5px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.pi-meta{font-size:10.5px; color:var(--muted); opacity:.85; margin-top:2px;}
.foot{padding:8px 20px; font-size:11px; color:var(--muted); border-top:1px solid var(--line); background:var(--panel);}
.foot b{color:var(--accent);}
@media (max-width:820px){
  .layout{grid-template-columns:1fr; grid-template-rows:1fr auto;}
  .sidebar{border-left:0; border-top:1px solid var(--line); max-height:40vh;}
  .tagline{display:none;}
}
</style>

<header class="topbar">
  <div class="brand">
    <span class="logo">🍜</span>
    <div>
      <p class="eyebrow">RAMEN RADAR · LIVE MAP</p>
      <h1>ラーメンレーダー</h1>
      <p class="tagline">SNSから直近<b id="windowLabel">60</b>分のラーメン投稿を集めて日本地図にピン表示</p>
    </div>
  </div>
  <div class="controls">
    <span id="demoBadge" class="badge badge-demo">DEMOデータ</span>
    <div class="stat"><span id="statLocated" class="stat-num">–</span><span class="stat-label">ピン</span></div>
    <label class="auto"><input type="checkbox" id="autoRefresh" checked> 自動更新</label>
    <button id="refreshBtn" class="btn" title="今すぐ更新">更新</button>
    <button id="themeBtn" class="iconbtn" title="表示テーマ切替" aria-label="テーマ切替">◐</button>
  </div>
</header>

<main class="layout">
  <section class="mapwrap" id="mapwrap">
    <svg id="map" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" aria-label="日本地図"></svg>
    <div id="tooltip" class="tooltip" hidden></div>
    <div class="legend">
      <span><i class="dot c-high"></i>ジオタグ（高精度）</span>
      <span><i class="dot c-medium"></i>地名一致（市区）</span>
      <span><i class="dot c-low"></i>地名一致（都道府県）</span>
    </div>
  </section>
  <aside class="sidebar">
    <div class="sidebar-head"><h2>最新の投稿</h2><span id="updatedAt" class="updated">–</span></div>
    <ul id="postList" class="post-list"></ul>
  </aside>
</main>

<footer class="foot">
  <span>位置は投稿のジオタグ・本文の地名から推定した<b>参考値</b>です。これは全国のラーメン投稿を模した<b>デモ</b>表示です（サーバ版はMastodon等から実データを取得）。</span>
</footer>

<script id="rr-geojson" type="application/json">/*__GEOJSON__*/</script>
<script id="rr-posts" type="application/json">/*__POSTS__*/</script>
<script id="rr-images" type="application/json">/*__IMAGES__*/</script>
<script>
const GEO=JSON.parse(document.getElementById('rr-geojson').textContent);
const RAW=JSON.parse(document.getElementById('rr-posts').textContent);
const IMAGES=JSON.parse(document.getElementById('rr-images').textContent);
const SVGNS='http://www.w3.org/2000/svg';
const el=id=>document.getElementById(id);

// ---- theme ----
const themeBtn=el('themeBtn');
themeBtn.addEventListener('click',()=>{
  const cur=document.documentElement.getAttribute('data-theme')
    || (matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
  document.documentElement.setAttribute('data-theme', cur==='dark'?'light':'dark');
  renderPins();
});

// ---- projection (equirectangular + latitude correction) ----
const VIEW_W=1000; let projection=null;
function boundsOf(g){let a=1e9,b=-1e9,c=1e9,d=-1e9;
  for(const f of g.features)for(const poly of f.geometry.coordinates)for(const ring of poly)for(const [lon,lat] of ring){
    if(lon<a)a=lon; if(lon>b)b=lon; if(lat<c)c=lat; if(lat>d)d=lat;}
  return {minLon:a,maxLon:b,minLat:c,maxLat:d};}
function buildProjection(bd){
  const midLat=((bd.minLat+bd.maxLat)/2)*(Math.PI/180), kx=Math.cos(midLat);
  const rawW=(bd.maxLon-bd.minLon)*kx, rawH=bd.maxLat-bd.minLat, pad=20;
  const scale=(VIEW_W-pad*2)/rawW, height=rawH*scale+pad*2;
  return {width:VIEW_W,height,project(lon,lat){
    return {x:pad+(lon-bd.minLon)*kx*scale, y:pad+(bd.maxLat-lat)*scale};}};}
function drawMap(){
  projection=buildProjection(boundsOf(GEO));
  const map=el('map'); map.setAttribute('viewBox',`0 0 ${projection.width} ${projection.height}`);
  const frag=document.createDocumentFragment();
  for(const f of GEO.features){let dd='';
    for(const poly of f.geometry.coordinates)for(const ring of poly){
      dd+=ring.map(([lon,lat],i)=>{const {x,y}=projection.project(lon,lat);return `${i?'L':'M'}${x.toFixed(1)} ${y.toFixed(1)}`;}).join(' ')+' Z ';}
    const p=document.createElementNS(SVGNS,'path'); p.setAttribute('d',dd); p.setAttribute('class','pref');
    const t=document.createElementNS(SVGNS,'title'); t.textContent=f.properties.nam_ja; p.appendChild(t); frag.appendChild(p);}
  map.appendChild(frag);
  const g=document.createElementNS(SVGNS,'g'); g.id='pins'; map.appendChild(g);
}

// ---- data (compute absolute time from minutesAgo at load/refresh) ----
let baseNow=Date.now(); let posts=[];
function rebuild(){ baseNow=Date.now();
  posts=RAW.map(p=>({...p, createdAt:baseNow-p.minutesAgo*60000, image:IMAGES[p.img]}))
           .sort((a,b)=>b.createdAt-a.createdAt);}
function timeAgo(ms){const s=Math.max(0,Math.floor((Date.now()-ms)/1000));
  if(s<60)return s+'秒前'; const m=Math.floor(s/60); if(m<60)return m+'分前'; return Math.floor(m/60)+'時間前';}
const cc={high:'c-high',medium:'c-medium',low:'c-low'};
const cl={high:'ジオタグ',medium:'地名(市区)',low:'地名(都道府県)'};
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

const pinById=new Map(), itemById=new Map();
function renderPins(){
  const g=el('pins'); if(!g)return; g.innerHTML=''; pinById.clear();
  for(const p of posts){const {x,y}=projection.project(p.lon,p.lat);
    const fresh=Date.now()-p.createdAt<10*60000;
    if(fresh){const h=document.createElementNS(SVGNS,'circle');
      h.setAttribute('cx',x); h.setAttribute('cy',y); h.setAttribute('r',4);
      h.setAttribute('class',`pin-halo pulse ${cc[p.confidence]}`); h.style.fill='currentColor'; g.appendChild(h);}
    const c=document.createElementNS(SVGNS,'circle');
    c.setAttribute('cx',x); c.setAttribute('cy',y); c.setAttribute('r',5.5);
    c.setAttribute('class',`pin ${cc[p.confidence]}`);
    c.addEventListener('mouseenter',e=>showTip(p,e)); c.addEventListener('mousemove',moveTip); c.addEventListener('mouseleave',hideTip);
    g.appendChild(c); pinById.set(p.id,c);}
}
function tipHTML(p){const tags=(p.tags||[]).slice(0,4).map(t=>`<span class="tt-tag">#${esc(t)}</span>`).join('');
  return `<img class="tt-img" src="${p.image}" alt="ラーメン画像">
   <div class="tt-body">
     <div class="tt-loc">📍 ${esc(p.locationLabel)} <span class="tt-conf conf-${p.confidence}">${cl[p.confidence]}</span></div>
     <div class="tt-text">${esc(p.text)}</div>
     <div class="tt-meta"><span>${esc(p.authorHandle||p.author)}</span><span>${timeAgo(p.createdAt)}</span></div>
     <div class="tt-tags">${tags}</div>
     <div class="tt-meta" style="margin-top:6px"><span>${esc(p.sourceLabel)}</span><span>推定: ${p.method==='geotag'?'ジオタグ':'本文の地名'}</span></div>
   </div>`;}
const tip=el('tooltip');
function showTip(p,e){tip.innerHTML=tipHTML(p); tip.hidden=false; moveTip(e); setActive(p.id,true);}
function moveTip(e){const r=el('mapwrap').getBoundingClientRect();
  let x=e.clientX-r.left, y=e.clientY-r.top; x=Math.max(140,Math.min(r.width-140,x));
  const flip=y<320; tip.classList.toggle('below',flip);
  tip.style.left=x+'px'; tip.style.top=(flip?y+18:Math.max(160,y))+'px';}
function hideTip(){tip.hidden=true; document.querySelectorAll('.active').forEach(n=>n.classList.remove('active'));}
function setActive(id,on){pinById.get(id)?.classList.toggle('active',on); itemById.get(id)?.classList.toggle('active',on);}

function renderList(){const list=el('postList'); list.innerHTML=''; itemById.clear();
  for(const p of posts){const li=document.createElement('li'); li.className='post-item';
    li.innerHTML=`<img src="${p.image}" alt="">
      <div class="pi-body"><div class="pi-loc">📍 ${esc(p.locationLabel)}</div>
      <div class="pi-text">${esc(p.text)}</div>
      <div class="pi-meta">${esc(p.sourceLabel)} ・ <span class="ago" data-t="${p.createdAt}">${timeAgo(p.createdAt)}</span></div></div>`;
    li.addEventListener('mouseenter',()=>{setActive(p.id,true); const pin=pinById.get(p.id);
      if(pin){const rc=pin.getBoundingClientRect(); showTip(p,{clientX:rc.left+rc.width/2,clientY:rc.top});}});
    li.addEventListener('mouseleave',()=>{setActive(p.id,false); hideTip();});
    list.appendChild(li); itemById.set(p.id,li);}
}
function refresh(){rebuild();
  el('statLocated').textContent=posts.length;
  el('updatedAt').textContent='更新 '+new Date().toLocaleTimeString('ja-JP');
  renderPins(); renderList();}
function tickTimes(){document.querySelectorAll('.ago').forEach(s=>s.textContent=timeAgo(Number(s.dataset.t)));}

let timer=null;
function sched(){clearInterval(timer); if(el('autoRefresh').checked) timer=setInterval(refresh,30000);}
el('refreshBtn').addEventListener('click',refresh);
el('autoRefresh').addEventListener('change',sched);
setInterval(tickTimes,10000);

drawMap(); refresh(); sched();
</script>
